<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>早安打卡</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"Microsoft YaHei","YouYuan",sans-serif;font-weight:700}
body{min-height:100vh;background-size:cover;background-position:center;background-attachment:fixed;padding:20px}
.container{max-width:400px;margin:0 auto}
.login{background:rgba(255,255,255,.95);border-radius:24px;padding:50px 30px;margin:100px auto;max-width:350px;text-align:center;box-shadow:0 10px 30px rgba(0,0,0,0.1)}
.wx-avatar{width:90px;height:90px;border-radius:50%;border:4px solid #fff}
.wx-name{font-size:24px;margin:16px 0 36px;color:#333}
.login-btn{background:#07C160;color:#fff;border:none;padding:16px 30px;border-radius:50px;font-size:17px;width:100%;cursor:pointer}
.user-bar{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,.85);padding:14px 16px;border-radius:16px;margin-top:20px}
.avatar{width:60px;height:60px;border-radius:50%}
.nick{font-size:20px;color:#333}
.edit{font-size:12px;color:#666;margin-top:4px;cursor:pointer}
.bg-bar{background:rgba(255,255,255,.9);padding:12px;border-radius:14px;margin-top:16px;text-align:center}
.bg-title{font-size:14px;margin-bottom:8px}
.bg-btn{padding:8px 12px;border-radius:12px;border:none;background:#f5f5f5;margin:0 4px;font-size:13px}
.bg-btn.active{background:#ff7a9c;color:#fff}
#bgFile{display:none}
.card{background:rgba(255,255,255,.92);border-radius:24px;padding:30px 26px;margin-top:24px}
.quote{text-align:center;font-size:16px;color:#444;margin:20px 0;line-height:1.7}
.check-btn{display:block;width:170px;height:170px;border-radius:50%;margin:20px auto;border:none;background:linear-gradient(135deg,#ff9a8b,#ff7a9c);color:#fff;font-size:22px;cursor:pointer}
.check-btn:disabled{background:#ccc}
.tip{text-align:center;font-size:14px;color:#555}
.stats{display:flex;justify-content:space-around;padding-top:20px;border-top:1px solid #eee;margin-top:20px}
.stats .item{text-align:center}
.stats .num{font-size:26px;color:#ff7a9c}
.stats .label{font-size:12px;color:#777}
.calendar{background:rgba(255,255,255,.9);padding:20px;border-radius:18px;margin-top:30px}
.cal-title{font-size:16px;margin-bottom:12px}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}
.cal-day{aspect-ratio:1/1;display:flex;align-items:center;justify-content:center;font-size:13px;background:#f5f5f5;border-radius:6px}
.cal-day.checked{background:#ff7a9c;color:#fff}
.poster-btn{display:block;margin:30px auto 0;padding:14px 32px;border:none;border-radius:30px;background:#fff;color:#ff7a9c;cursor:pointer}
.logout{display:block;margin:20px auto;padding:10px 20px;border:none;border-radius:30px;background:#f5f5f5;color:#666;cursor:pointer}
#poster{display:none;margin:30px auto;text-align:center}
#posterImg{width:100%;max-width:380px;border-radius:20px;box-shadow:0 10px 30px rgba(0,0,0,0.15)}
#app{display:none}
</style>
</head>
<body>

<div id="login" class="login">
  <img class="wx-avatar" src="https://picsum.photos/seed/wxuser/200/200">
  <div class="wx-name">微信用户</div>
  <button class="login-btn" onclick="login()">微信登录</button>
</div>

<div id="app" class="container">
  <div class="user-bar">
    <img id="avatar" class="avatar">
    <div>
      <div id="nick" class="nick"></div>
      <div class="edit" onclick="editNick()">修改昵称</div>
    </div>
  </div>

  <div class="bg-bar">
    <div class="bg-title">背景设置</div>
    <button class="bg-btn active" id="autoBg" onclick="setAutoBg()">每日风景</button>
    <button class="bg-btn" id="customBg" onclick="selectBg()">自定义图片</button>
    <input type="file" id="bgFile" accept="image/*">
  </div>

  <div class="card">
    <div class="quote" id="quote"></div>
    <button class="check-btn" id="checkBtn">立即打卡</button>
    <div class="tip" id="tip"></div>
    <div class="stats">
      <div class="item"><div class="num" id="continueDay">0</div><div class="label">连续打卡</div></div>
      <div class="item"><div class="num" id="totalDay">0</div><div class="label">累计打卡</div></div>
    </div>
  </div>

  <div class="calendar">
    <div class="cal-title">本月打卡</div>
    <div class="cal-grid" id="calGrid"></div>
  </div>

  <button class="poster-btn" onclick="makePoster()">生成朋友圈打卡图</button>
  <button class="logout" onclick="logout()">退出登录</button>

  <div id="poster">
    <img id="posterImg">
  </div>
</div>

  {m:2,d:4,t:"今日立春｜春回大地，万物向阳"},{m:2,d:19,t:"今日雨水｜春雨润心，万事温柔"},

  "https://picsum.photos/seed/sunrise1/1200/2400","https://picsum.photos/seed/sunrise2/1200/2400",
  "https://picsum.photos/seed/sunrise3/1200/2400","https://picsum.photos/seed/sunrise4/1200/2400",

function getLunar(){
  const mNames = ["正月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","腊月"];
  return mNames[now.getMonth()] + now.getDate() + "日";
}

function getText(){
  const j = jieqi.find(i=>i.m===m&&i.d===d);
  const h = holiday.find(i=>i.m===m&&i.d===d);
  if(h) return h.t;
  if(j) return j.t;
  return quotes[dayOfYear % quotes.length];
}

function getData(){
  const d = localStorage.getItem(STORAGE);
  return d ? JSON.parse(d) : {records:[], continue:0, last:"", checkTime:""};
}
function saveData(d){localStorage.setItem(STORAGE, JSON.stringify(d))}
function getUser(){const u=localStorage.getItem(USER);return u?JSON.parse(u):null}
function saveUser(u){localStorage.setItem(USER,JSON.stringify(u))}
function logout(){localStorage.clear();location.reload()}
function getBg(){const b=localStorage.getItem(BG);return b?JSON.parse(b):{auto:true,url:""}}
function saveBg(a,u){localStorage.setItem(BG,JSON.stringify({auto:a,url:u}))}

function setBg(url){document.body.style.backgroundImage=`url(${url})`}
function setAutoBg(){
  saveBg(true,"");
  setBg(bgs[dayOfYear%bgs.length]);
  document.getElementById("autoBg").classList.add("active");
  document.getElementById("customBg").classList.remove("active");
}
function selectBg(){document.getElementById("bgFile").click()}
document.getElementById("bgFile").onchange=e=>{
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    const u=ev.target.result;saveBg(false,u);setBg(u);
    document.getElementById("customBg").classList.add("active");
    document.getElementById("autoBg").classList.remove("active");
  }
  r.readAsDataURL(f);
}

function login(){
  const u={nick:"微信用户"+Math.floor(Math.random()*9999),avatar:"https://picsum.photos/seed/wx"+Date.now()+"/200/200"};
  saveUser(u);start();
}

function start(){
  document.getElementById("login").style.display="none";
  document.getElementById("app").style.display="block";
  const u=getUser();
  document.getElementById("avatar").src=u.avatar;
  document.getElementById("nick").innerText=u.nick;
  const bg=getBg();
  setBg(bg.auto ? bgs[dayOfYear%bgs.length] : bg.url);
  renderAll();
}

function isChecked(){return getData().records.includes(today)}
function renderBtn(){
  const btn=document.getElementById("checkBtn");
  const tip=document.getElementById("tip");
  if(isChecked()){
    btn.innerText="今日已打卡";btn.disabled=true;
    tip.innerText="✅ 已完成早安打卡";
  }else{
    btn.innerText="立即打卡";btn.disabled=false;
    tip.innerText="新的一天，加油！";
  }
}
function renderStats(){
  const d=getData();
  document.getElementById("continueDay").innerText=d.continue||0;
  document.getElementById("totalDay").innerText=d.records.length||0;
}
function renderCal(){
  const g=document.getElementById("calGrid");g.innerHTML="";
  const d=getData();const days=new Date(y,m,0).getDate();
  for(let i=1;i<=days;i++){
    const c=d.records.includes(`${y}-${m}-${i}`)?"cal-day checked":"cal-day";
    g.innerHTML+=`<div class="${c}">${i}</div>`;
  }
}
function calcContinue(){
  const d=getData();if(d.last===today)return;
  const yes=new Date();yes.setDate(now.getDate()-1);
  const yesStr=`${yes.getFullYear()}-${yes.getMonth()+1}-${yes.getDate()}`;
  d.continue=d.records.includes(yesStr)?(d.continue||0)+1:1;
  d.last=today;saveData(d);
}
function doCheck(){
  if(isChecked())return;
  const d=getData();
  d.records.push(today);
  d.checkTime = `${now.getHours()}:${now.getMinutes().toString().padStart(2,'0')}`;
  calcContinue();saveData(d);
  renderBtn();renderStats();renderCal();
}
function editNick(){
  const u=getUser();
  const name=prompt("请输入昵称",u.nick);
  if(name&&name.trim()){u.nick=name.trim();saveUser(u);document.getElementById("nick").innerText=u.nick;}
}

function makePoster(){
  const u=getUser();
  const d=getData();
  const size=720;
  const canvas=document.createElement("canvas");
  canvas.width=size;canvas.height=size;
  const ctx=canvas.getContext("2d");
  const img=new Image();
  img.crossOrigin="anonymous";
  const bgData=getBg();
  img.src=bgData.auto?bgs[dayOfYear%bgs.length]:bgData.url;

  img.onload=()=>{
    ctx.drawImage(img,0,0,size,size);
    ctx.fillStyle="rgba(0,0,0,0.4)";
    ctx.fillRect(0,0,size,size);

    ctx.fillStyle="#fff";
    ctx.textAlign="left";
    ctx.font="bold 32px Microsoft YaHei";
    
    const week = ["星期日","星期一","星期二","星期三","星期四","星期五","星期六"][now.getDay()];
    const solar = `${y}年${m}月${d}日`;
    const lunar = getLunar();
    const checkTime = isChecked() ? d.checkTime : "未打卡";

    ctx.drawImage(document.getElementById("avatar"), 40, 40, 90, 90);
    ctx.fillText(week, 150, 62);
    ctx.fillText(solar, 150, 102);
    ctx.fillText(lunar, 150, 142);
    ctx.fillText(`今日打卡时间：${checkTime}`, 40, 190);

    ctx.textAlign="center";
    ctx.font="bold 38px Microsoft YaHei";
    ctx.fillText(getText(), size/2, 280);
    ctx.font="bold 64px Microsoft YaHei";
    ctx.fillText(`连续 ${d.continue||0} 天`, size/2, 380);
    ctx.fillText(`累计 ${d.records.length||0} 天`, size/2, 470);

    document.getElementById("poster").style.display="block";
    document.getElementById("posterImg").src=canvas.toDataURL("image/png");
  }
}

function renderAll(){
  document.getElementById("quote").innerText=getText();
  renderBtn();renderStats();renderCal();
  document.getElementById("checkBtn").onclick=doCheck;
}

window.onload=()=>{if(getUser())start()}
